<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiro Gateway - Token Usage Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --accent2: #00cec9;
  --accent3: #fd79a8;
  --accent4: #fdcb6e;
  --green: #00b894;
  --red: #e17055;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
.header h1 span { color: var(--accent); }
.config { display: flex; gap: 8px; flex: 1; min-width: 300px; }
.config input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.config input:first-child { flex: 1; min-width: 180px; }
.config input:last-of-type { width: 200px; }
.btn { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; }
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 4px 10px; font-size: 12px; background: var(--border); }
.status { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
.status.ok { color: var(--green); }
.status.err { color: var(--red); }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; }
.card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.chart-box.full { grid-column: 1 / -1; }
.chart-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.chart-box h3 input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 8px; border-radius: 4px; font-size: 12px; }

.table-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-box h3 { font-size: 14px; font-weight: 600; padding: 16px 20px 12px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 20px; text-align: left; font-size: 13px; }
th { color: var(--text-dim); font-weight: 500; border-bottom: 1px solid var(--border); }
td { border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
.num { text-align: right; font-variant-numeric: tabular-nums; }

.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty p { margin-top: 8px; font-size: 13px; }

@media (max-width: 768px) {
  .charts { grid-template-columns: 1fr; }
  .config { flex-direction: column; }
  .config input { width: 100% !important; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>Kiro</span> Token Dashboard</h1>
  <div class="config">
    <input id="url" type="text" placeholder="Gateway URL (e.g. http://localhost:34080)">
    <input id="key" type="password" placeholder="API Key">
    <button class="btn" onclick="connect()">Connect</button>
    <button class="btn btn-sm" onclick="refresh()">Refresh</button>
  </div>
  <span id="status" class="status"></span>
</div>

<div class="container">
  <div id="empty-state" class="empty">
    <h2>No data yet</h2>
    <p>Enter your gateway URL and API key above, then click Connect.</p>
  </div>

  <div id="dashboard" style="display:none">
    <div class="cards">
      <div class="card">
        <div class="label">Total Input Tokens</div>
        <div class="value" id="total-input">-</div>
        <div class="sub" id="total-input-sub"></div>
      </div>
      <div class="card">
        <div class="label">Total Output Tokens</div>
        <div class="value" id="total-output">-</div>
        <div class="sub" id="total-output-sub"></div>
      </div>
      <div class="card">
        <div class="label">Total Tokens</div>
        <div class="value" id="total-all">-</div>
      </div>
      <div class="card">
        <div class="label">Total Requests</div>
        <div class="value" id="total-reqs">-</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-box">
        <h3>Usage by Model</h3>
        <canvas id="chart-models"></canvas>
      </div>
      <div class="chart-box">
        <h3>Daily Trend (14 days)</h3>
        <canvas id="chart-daily"></canvas>
      </div>
      <div class="chart-box full">
        <h3>Hourly Usage <input id="hourly-date" type="date" onchange="loadHourly()"></h3>
        <canvas id="chart-hourly"></canvas>
      </div>
    </div>

    <div class="table-box">
      <h3>Breakdown by Model</h3>
      <table>
        <thead><tr><th>Model</th><th class="num">Input Tokens</th><th class="num">Output Tokens</th><th class="num">Total</th><th class="num">Requests</th></tr></thead>
        <tbody id="model-table"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const COLORS = ['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#00b894','#e17055','#74b9ff','#a29bfe','#55efc4','#fab1a0'];
let chartModels, chartDaily, chartHourly;
let refreshTimer;

function saved(k, v) { if (v !== undefined) localStorage.setItem('kiro_dash_'+k, v); return localStorage.getItem('kiro_dash_'+k) || ''; }

window.onload = () => {
  document.getElementById('url').value = saved('url') || 'http://localhost:34080';
  document.getElementById('key').value = saved('key');
  document.getElementById('hourly-date').value = new Date().toISOString().slice(0, 10);
  if (saved('key')) connect();
};

async function api(path) {
  const base = document.getElementById('url').value.replace(/\/+$/, '');
  const key = document.getElementById('key').value;
  const r = await fetch(base + path, { headers: { 'Authorization': 'Bearer ' + key } });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

function fmt(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function setStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : ok === false ? 'err' : '');
}

async function connect() {
  saved('url', document.getElementById('url').value);
  saved('key', document.getElementById('key').value);
  await refresh();
  clearInterval(refreshTimer);
  refreshTimer = setInterval(refresh, 60000);
}

async function refresh() {
  try {
    setStatus('Loading...');
    const [summary, daily] = await Promise.all([
      api('/v1/stats/tokens'),
      api('/v1/stats/tokens/daily'),
    ]);
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('dashboard').style.display = '';
    renderSummary(summary);
    renderModelsChart(summary.by_model);
    renderDailyChart(daily.daily);
    renderTable(summary.by_model);
    await loadHourly();
    setStatus('Updated ' + new Date().toLocaleTimeString(), true);
  } catch (e) {
    setStatus('Error: ' + e.message, false);
  }
}

function renderSummary(data) {
  const t = data.total;
  document.getElementById('total-input').textContent = fmt(t.input_tokens);
  document.getElementById('total-output').textContent = fmt(t.output_tokens);
  document.getElementById('total-all').textContent = fmt(t.total_tokens);
  document.getElementById('total-reqs').textContent = fmt(t.request_count);
}

function renderModelsChart(models) {
  const ctx = document.getElementById('chart-models');
  if (chartModels) chartModels.destroy();
  chartModels = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: models.map(m => m.model),
      datasets: [
        { label: 'Input', data: models.map(m => m.input_tokens), backgroundColor: '#6c5ce7' },
        { label: 'Output', data: models.map(m => m.output_tokens), backgroundColor: '#00cec9' },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8b8fa3' } } },
      scales: {
        x: { ticks: { color: '#8b8fa3', font: { size: 11 } }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#8b8fa3', callback: v => fmt(v) }, grid: { color: '#2a2d3a' } },
      }
    }
  });
}

function renderDailyChart(daily) {
  const dates = [...new Set(daily.map(d => d.date))].sort();
  const models = [...new Set(daily.map(d => d.model))];
  const ctx = document.getElementById('chart-daily');
  if (chartDaily) chartDaily.destroy();
  chartDaily = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates.map(d => d.slice(5)),
      datasets: models.map((m, i) => ({
        label: m,
        data: dates.map(date => {
          const row = daily.find(r => r.date === date && r.model === m);
          return row ? row.input_tokens + row.output_tokens : 0;
        }),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: COLORS[i % COLORS.length] + '20',
        fill: true,
        tension: 0.3,
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8b8fa3' } } },
      scales: {
        x: { ticks: { color: '#8b8fa3' }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#8b8fa3', callback: v => fmt(v) }, grid: { color: '#2a2d3a' } },
      }
    }
  });
}

async function loadHourly() {
  try {
    const date = document.getElementById('hourly-date').value;
    const data = await api('/v1/stats/tokens/hourly?date=' + date);
    renderHourlyChart(data.hourly, date);
  } catch (e) { /* ignore */ }
}

function renderHourlyChart(hourly, date) {
  const hours = Array.from({length: 24}, (_, i) => date + 'T' + String(i).padStart(2, '0'));
  const models = [...new Set(hourly.map(h => h.model))];
  const ctx = document.getElementById('chart-hourly');
  if (chartHourly) chartHourly.destroy();
  chartHourly = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: hours.map(h => h.slice(11) + ':00'),
      datasets: models.map((m, i) => ({
        label: m,
        data: hours.map(hour => {
          const row = hourly.find(r => r.hour === hour && r.model === m);
          return row ? row.input_tokens + row.output_tokens : 0;
        }),
        backgroundColor: COLORS[i % COLORS.length],
      }))
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#8b8fa3' } } },
      scales: {
        x: { stacked: true, ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
        y: { stacked: true, ticks: { color: '#8b8fa3', callback: v => fmt(v) }, grid: { color: '#2a2d3a' } },
      }
    }
  });
}

function renderTable(models) {
  const tbody = document.getElementById('model-table');
  tbody.innerHTML = models.map(m => `
    <tr>
      <td>${m.model}</td>
      <td class="num">${m.input_tokens.toLocaleString()}</td>
      <td class="num">${m.output_tokens.toLocaleString()}</td>
      <td class="num">${(m.input_tokens + m.output_tokens).toLocaleString()}</td>
      <td class="num">${m.request_count.toLocaleString()}</td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
